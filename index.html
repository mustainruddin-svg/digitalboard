<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Board - SDIT Ar-Rahmah</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #004d99, #1e90ff);
        color: white;
        padding: 20px;
        overflow: hidden; 
    }
    
    /* Header & Logo */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid rgba(255,255,255,0.2);
        padding-bottom: 15px;
    }
    .header-left {
        display: flex;
        align-items: center;
        gap: 20px;
    }
    .header-left .logo {
        height: 70px;
        width: auto;
        filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
    }
    .header-text h1 {
        margin: 0;
        font-size: 32px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .header-text p {
        margin: 5px 0 0 0;
        font-size: 18px;
        color: #e0f0ff;
    }
    .clock-container {
        text-align: right;
    }
    .clock {
        font-size: 48px;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        letter-spacing: 2px;
    }
    .date {
        font-size: 18px;
        color: #ffd43b;
        font-weight: bold;
    }

    /* Layout Utama */
    .main {
        display: flex;
        gap: 25px;
        margin-top: 25px;
    }
    
    /* Box Kiri (Slides) */
    .left {
        flex: 2;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 20px;
        padding: 40px;
        height: 65vh; 
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        transition: all 0.8s ease-in-out;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    #slideTitle {
        background: rgba(0, 51, 102, 0.8);
        padding: 15px 25px;
        border-radius: 10px;
        margin: 0;
        font-size: 28px;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    /* Box Kanan (Cards) */
    .right {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    .card {
        background: rgba(255, 255, 255, 0.95);
        color: #222;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 8px 15px rgba(0,0,0,0.15);
    }
    .card h3 {
        margin-top: 0;
        color: #004d99;
        border-bottom: 2px solid #ffd43b;
        padding-bottom: 8px;
        font-size: 20px;
        margin-bottom: 15px;
    }

    /* Info Waktu Sholat Gabungan */
    #countdown {
        font-size: 36px;
        color: #d93025;
        text-align: center;
        margin: 5px 0 0 0;
        font-weight: bold;
    }
    .prayer-row {
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        background: #f4f8fb;
        padding: 12px;
        border-radius: 10px;
        margin-top: 15px;
        color: #003366;
        font-weight: bold;
    }
    .prayer-row span {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
    }
    .prayer-row span b {
        font-size: 11px;
        color: #666;
        text-transform: uppercase;
    }

    /* Kegiatan Bulan Ini */
    .kegiatan-item {
        display: flex;
        justify-content: space-between;
        font-size: 15px;
        padding: 8px 0;
        border-bottom: 1px dashed #ccc;
        color: #222;
    }
    .kegiatan-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
    }
    .kegiatan-tgl {
        font-weight: bold;
        color: #d93025;
        font-size: 13px;
        white-space: nowrap;
        margin-left: 15px;
    }

    /* Pesan Pendidikan */
    .hikmah-text {
        font-size: 15px;
        line-height: 1.5;
        font-style: italic;
        color: #444;
        text-align: center;
        margin: 0;
        min-height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

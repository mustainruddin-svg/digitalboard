<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDIT Lobby Display</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0d6efd,#1e90ff);
    color:white;
    padding:20px;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.clock{
    font-size:48px;
    font-weight:bold;
}
.main{
    display:flex;
    gap:20px;
    margin-top:20px;
}
.left{
    flex:2;
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    padding:40px;
    min-height:400px;
    background-size:cover;
    background-position:center;
}
.right{
    flex:1;
}
.card{
    background:white;
    color:#222;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
}
.running{
    margin-top:20px;
    background:#ffd43b;
    color:#003366;
    padding:15px;
    border-radius:15px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="header">
    <div>
        <h1 id="title">Loading...</h1>
        <p id="subtitle"></p>
    </div>
    <div>
        <div class="clock" id="clock"></div>
        <div id="date"></div>
    </div>
</div>

<div class="main">
    <div class="left" id="slideBox">
        <h2 id="slideTitle"></h2>
    </div>

    <div class="right">
        <div class="card">
            <h3>Jadwal Sholat</h3>
            <p>Subuh : otomatis API</p>
            <p>Dzuhur : otomatis API</p>
            <p>Ashar : otomatis API</p>
            <p>Maghrib : otomatis API</p>
            <p>Isya : otomatis API</p>
        </div>

        <div class="card">
            <h3>Menuju Sholat Terdekat</h3>
            <h2 id="countdown">45 menit lagi</h2>
        </div>
    </div>
</div>

<div class="running" id="runningText"></div>

<script>
const apiURL = "https://script.google.com/macros/s/AKfycbxuGkecVS-iA62IuZNXyovpQgwxuGIdN56u1-ON8BF1I61eNxCqxsaX0DAgoU7mV-AW/exec?unit=SDIT";

let slides = [];
let currentSlide = 0;

fetch(apiURL)
.then(res => res.json())
.then(data => {
    document.getElementById("title").innerHTML = data.title;
    document.getElementById("subtitle").innerHTML = data.subtitle;
    document.getElementById("runningText").innerHTML = data.running_text.join(" | ");

    slides = data.slides;
    showSlide();
    setInterval(nextSlide,5000);
});

function showSlide(){
    let slide = slides[currentSlide];
    document.getElementById("slideTitle").innerHTML = slide.title;
}

function nextSlide(){
    currentSlide = (currentSlide + 1) % slides.length;
    showSlide();
}
